services:
  - type: web
    name: woolf-api
    runtime: node
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter=api build && yes '' | pnpm --filter=api exec drizzle-kit push --force && pnpm --filter=api db:seed:all
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: woolf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: woolf-db
    plan: free
