version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: woolf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woolf
      POSTGRES_PASSWORD: woolf_password
      POSTGRES_DB: woolf_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U woolf -d woolf_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
